name: vynix
description: vynix - personal all-in-one daily driver app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  adaptive_dialog: ^2.4.2
  intl: ^0.20.2
  collection: ^1.19.1
  cached_network_image: ^3.4.1

  # Persistence layer (recommended for 2026 complexity and query power).
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5

  # Foundation utilities for upcoming features.
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  flutter_local_notifications: ^19.4.2
  permission_handler: ^12.0.1
  record: ^6.1.2
  speech_to_text: ^7.3.0
  flutter_quill: ^11.5.0
  math_expressions: ^2.6.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.8.0
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3
  custom_lint: ^0.8.1
  drift_dev: ^2.29.0

flutter:
  uses-material-design: true
